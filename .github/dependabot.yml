version: 2

# Without this file the "pinned by SHA, bumped by Dependabot" contract (README, "Pinning and rollout") has
# nothing behind it — the SHA pins freeze and rot. directory "/" also scans this repo's own action.yml.
#
# assignees is ekwi-bot (the PR is owned by automation; Dependabot honours assignees only for write-access
# accounts). Who REVIEWS is CODEOWNERS' job — GitHub removed dependabot.yml's reviewers: option on 2025-08-08.
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    assignees:
      - ekwi-bot
    commit-message:
      prefix: ci          # Conventional Commits type — commitlint.yml accepts it
    groups:
      actions-all:
        patterns:
          - "*"
    # Two cycles broken by ignoring the dependency here — in both cases the OTHER repo keeps watching us, so the
    # rollout stays one-way:
    # - release-notes-action co-evolves with this repo (repinned by hand); left to Dependabot the two ping-pong.
    # - release-workflow is consumed back now: this repo's commitlint.yml calls its reusable, while release-workflow
    #   already pins this action. Watching it here would ping-pong; ignore it (release-workflow keeps watching us).
    ignore:
      - dependency-name: "ekwi-tech/release-notes-action"
      - dependency-name: "ekwi-tech/release-workflow"
