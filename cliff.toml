# git-cliff configuration — https://git-cliff.org/docs/configuration
# Generates the release body — the delta since the last tag — from Conventional Commits.
#
#   git-cliff --unreleased --tag vX.Y.Z --strip all
#
# --strip all drops the header, leaving this version's section alone. Full history is the /releases page, one
# delta per entry; the same config rebuilds a full file with `--tag vX.Y.Z` alone if ever wanted.
[changelog]
header = """
# Changelog

Generated by git-cliff from Conventional Commits at release time. Do not edit by hand — the next release
overwrites it.
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits %}\
- {% if commit.breaking %}**BREAKING** {% endif %}{{ commit.message | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/ekwi-tech/next-version-action/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

# No [remote.github] section: it makes git-cliff call the GitHub API to enrich notes with PR data, which 403s on
# a private repo without a token and makes git-cliff panic.

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = []

# What reaches the release notes. This is a plain action repository — nothing here is redistributed into another
# repo — so the housekeeping types (chore, style, test, ci, build) are internal and skipped, unlike in the
# template repository where a `ci` change ships into every client.
commit_parsers = [
  { message = "^feat",     group = "Features"      },
  { message = "^fix",      group = "Bug Fixes"     },
  { message = "^perf",     group = "Performance"   },
  { message = "^refactor", group = "Refactoring"   },
  { message = "^docs",     group = "Documentation" },
  { message = "^chore|^style|^test|^ci|^build", skip = true },
]
protect_breaking_commits = true
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
